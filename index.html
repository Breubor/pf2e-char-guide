<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PF2e Character Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c09;
      --surface: #16130e;
      --surface2: #1e1a12;
      --border: rgba(180, 140, 60, 0.2);
      --border-strong: rgba(180, 140, 60, 0.45);
      --gold: #c49a3c;
      --gold-light: #e8c96a;
      --text: #e8e0d0;
      --text-muted: #8a7e6a;
      --text-dim: #5a5045;
      --user-bg: #1a1508;
      --lookup-bg: #0e1510;
      --lookup-border: rgba(60, 140, 80, 0.35);
      --lookup-text: #6aaa7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 2rem 1rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-style: italic;
    }

    .ornament {
      color: var(--gold);
      font-size: 1.1rem;
      margin: 0.5rem 0 0;
      letter-spacing: 0.5em;
      opacity: 0.6;
    }

    main {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1rem;
      min-height: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 60vh;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 0 4px;
    }

    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      line-height: 1.65;
      font-size: 1rem;
      border-radius: 2px;
      white-space: pre-wrap;
    }

    .msg.user {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-bottom-right-radius: 0;
      color: var(--text);
    }

    .msg.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0;
      color: var(--text);
    }

    .msg.thinking {
      color: var(--text-muted);
      font-style: italic;
    }

    .msg.thinking::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .lookup-notice {
      align-self: flex-start;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--lookup-text);
      background: var(--lookup-bg);
      border: 1px solid var(--lookup-border);
      border-radius: 2px;
      padding: 4px 10px;
      max-width: 85%;
    }

    .lookup-notice a {
      color: var(--lookup-text);
      opacity: 0.8;
      font-size: 0.75rem;
      margin-left: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.25rem 0;
      max-width: 85%;
    }

    .qbtn {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      padding: 4px 12px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.15s, color 0.15s;
      font-style: italic;
    }

    .qbtn:hover {
      background: var(--surface2);
      color: var(--gold-light);
    }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 1rem 0 1.5rem;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      padding: 0.65rem 0.85rem;
      border-radius: 2px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--border-strong); }
    #user-input::placeholder { color: var(--text-dim); font-style: italic; }

    #send-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 0 1.1rem;
      height: 44px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--surface2);
      color: var(--gold-light);
    }

    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .error-msg { color: #c46a6a; font-style: italic; font-size: 0.9rem; }

    footer {
      width: 100%;
      text-align: center;
      padding: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    @media (max-width: 480px) {
      .msg { max-width: 95%; font-size: 0.95rem; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pathfinder 2e &mdash; Character Guide</h1>
  <p>A guide to help you build a character that fits your vision</p>
  <div class="ornament">&#10022; &#10022; &#10022;</div>
</header>

<main>
  <div id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>
  <div class="input-area">
    <textarea
      id="user-input"
      placeholder="Describe your character idea, or ask anything..."
      rows="1"
      aria-label="Your message"
    ></textarea>
    <button id="send-btn" aria-label="Send message">Send</button>
  </div>
</main>

<footer>
  Pathfinder 2e is a trademark of Paizo Inc. This tool is unofficial and fan-made.
  Rules sourced from <a href="https://2e.aonprd.com" target="_blank" rel="noopener">Archives of Nethys</a>.
</footer>

<script>
const SYSTEM_PROMPT = `You are a knowledgeable and friendly Pathfinder 2e character creation guide. You have access to a tool that fetches live rules from the Archives of Nethys (2e.aonprd.com).

Use the fetch_nethys tool whenever a player asks about something specific — an ancestry, class, background, feat, spell, or condition — where accurate rules details matter. Always tell the player you are looking something up before you do it, using natural language like "Let me check the Dwarf ancestry for you..." or "Looking that up on Nethys now...".

Key Archives of Nethys URL patterns:
- Ancestry list: https://2e.aonprd.com/Ancestries.aspx
- Specific ancestry by ID: https://2e.aonprd.com/Ancestries.aspx?ID=1 (Dwarf=1, Elf=2, Gnome=3, Goblin=4, Halfling=5, Human=6, Leshy=8, Orc=12)
- Class list: https://2e.aonprd.com/Classes.aspx
- Specific class by ID: https://2e.aonprd.com/Classes.aspx?ID=7 (Fighter=7, Rogue=10, Wizard=12, Cleric=5, Bard=3, Druid=6, Ranger=9, Monk=8, Champion=4, Sorcerer=11, Barbarian=2, Swashbuckler=22, Investigator=15, Alchemist=1, Oracle=17, Witch=23)
- Background list: https://2e.aonprd.com/Backgrounds.aspx
- Feats: https://2e.aonprd.com/Feats.aspx?ID=1
- Conditions: https://2e.aonprd.com/Conditions.aspx
- Spells: https://2e.aonprd.com/Spells.aspx

General rules you know without needing a lookup:
- Attribute modifiers start at +0. Boosts add +1 (or partial if already +4). Flaws subtract 1. Max +4 at level 1
- Proficiency ranks: Untrained (+level+0), Trained (+level+2), Expert (+level+4), Master (+level+6), Legendary (+level+8)
- Saving throws: Fortitude (Con), Reflex (Dex), Will (Wis)
- AC = 10 + Dex modifier (capped by armor) + proficiency bonus + armor item bonus
- Character creation steps: concept, ancestry + heritage + ancestry feat, background, class, attribute boosts, skills, feats, equipment

Your approach:
1. Ask about the player's concept or playstyle first if they haven't shared it
2. Suggest ancestry + class + background combos that synergize, and explain why
3. Flag trap picks honestly — if something is mechanically awkward, say so and offer a better path
4. Do not just validate every choice
5. Keep responses concise — clear guidance, not walls of text
6. Offer 2-3 focused options when choices come up, not exhaustive lists
7. Explain jargon when you use it
8. When the player has settled their main choices, offer a summary

Greet the player warmly and ask what kind of character they have in mind.`;

let history = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(role, text, isThinking = false) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Guide';

  const div = document.createElement('div');
  div.className = 'msg ' + role + (isThinking ? ' thinking' : '');
  div.textContent = text;

  wrap.appendChild(label);
  wrap.appendChild(div);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return { wrap, div };
}

function addLookupNotice(reason, url) {
  const notice = document.createElement('div');
  notice.className = 'lookup-notice';
  notice.innerHTML = `Checking Nethys: ${reason} <a href="${url}" target="_blank" rel="noopener">[source]</a>`;
  messagesEl.appendChild(notice);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showQuickReplies() {
  const wrap = document.createElement('div');
  wrap.className = 'quick-btns';
  const prompts = [
    'I want to be a sneaky rogue type',
    'I want a powerful spellcaster',
    'I want a tanky front-line fighter',
    'I want a healer or support character',
    'Surprise me with something interesting',
  ];
  prompts.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'qbtn';
    btn.textContent = p;
    btn.onclick = () => { wrap.remove(); sendMessage(p); };
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function callAPI(messages) {
  const res = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: SYSTEM_PROMPT, messages }),
  });
  if (!res.ok) throw new Error('Server error ' + res.status);
  return res.json();
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;

  const { wrap: thinkWrap, div: thinkDiv } = addMessage('assistant', 'Thinking', true);

  try {
    const data = await callAPI(history);

    thinkWrap.remove();

    // Show any Nethys lookups that happened server-side
    if (data.toolLookups && data.toolLookups.length > 0) {
      data.toolLookups.forEach(lookup => {
        addLookupNotice(lookup.reason, lookup.url);
      });
    }

    const reply = data.reply || 'Sorry, something went wrong.';
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    thinkDiv.textContent = 'Something went wrong. Please try again.';
    thinkDiv.classList.remove('thinking');
    thinkDiv.classList.add('error-msg');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

sendBtn.onclick = () => sendMessage(inputEl.value);
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

(async () => {
  sendBtn.disabled = true;
  const { wrap: thinkWrap, div: thinkDiv } = addMessage('assistant', 'Loading', true);
  try {
    const data = await callAPI([{ role: 'user', content: 'Hello, I need help creating a Pathfinder 2e character.' }]);
    thinkWrap.remove();
    const greeting = data.reply || 'Hello! Tell me about the character you want to play.';
    addMessage('assistant', greeting);
    history.push({ role: 'user', content: 'Hello, I need help creating a Pathfinder 2e character.' });
    history.push({ role: 'assistant', content: greeting });
    showQuickReplies();
  } catch {
    thinkDiv.textContent = 'Could not connect. Please refresh the page.';
    thinkDiv.classList.remove('thinking');
    thinkDiv.classList.add('error-msg');
  }
  sendBtn.disabled = false;
})();
</script>
</body>
</html>
