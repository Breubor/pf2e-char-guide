<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PF2e Character Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c09;
      --surface: #16130e;
      --surface2: #1e1a12;
      --border: rgba(180, 140, 60, 0.2);
      --border-strong: rgba(180, 140, 60, 0.45);
      --gold: #c49a3c;
      --gold-light: #e8c96a;
      --text: #e8e0d0;
      --text-muted: #8a7e6a;
      --text-dim: #5a5045;
      --user-bg: #1a1508;
      --lookup-bg: #0e1510;
      --lookup-border: rgba(60, 140, 80, 0.35);
      --lookup-text: #6aaa7a;
      --verify-ok-bg: #0e1510;
      --verify-ok-border: rgba(60, 140, 80, 0.35);
      --verify-ok-text: #6aaa7a;
      --verify-fail-bg: #150e0e;
      --verify-fail-border: rgba(160, 60, 60, 0.4);
      --verify-fail-text: #c47a7a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 17px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 2rem 1rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
      font-style: italic;
    }

    .ornament {
      color: var(--gold);
      font-size: 1.1rem;
      margin: 0.5rem 0 0;
      letter-spacing: 0.5em;
      opacity: 0.6;
    }

    main {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 1rem;
      min-height: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 60vh;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    .msg-wrap { display: flex; flex-direction: column; gap: 3px; }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 0 4px;
    }

    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      line-height: 1.65;
      font-size: 1rem;
      border-radius: 2px;
    }

    .msg p {
      margin-bottom: 0.6rem;
    }

    .msg p:last-child {
      margin-bottom: 0;
    }

    .msg ul {
      padding-left: 1.4rem;
      margin: 0.4rem 0;
    }

    .msg ul li {
      margin-bottom: 0.3rem;
    }

    .msg ul + p, .msg p + ul {
      margin-top: 0.5rem;
    }

    .msg.user {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-bottom-right-radius: 0;
    }

    .msg.assistant {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0;
    }

    .msg.thinking {
      color: var(--text-muted);
      font-style: italic;
    }

    .msg.thinking::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .tool-notice {
      font-size: 0.8rem;
      font-style: italic;
      border-radius: 2px;
      padding: 4px 10px;
      max-width: 85%;
      align-self: flex-start;
    }

    .tool-notice.fetch {
      color: var(--lookup-text);
      background: var(--lookup-bg);
      border: 1px solid var(--lookup-border);
    }

    .tool-notice.verify-ok {
      color: var(--verify-ok-text);
      background: var(--verify-ok-bg);
      border: 1px solid var(--verify-ok-border);
    }

    .tool-notice.verify-fail {
      color: var(--verify-fail-text);
      background: var(--verify-fail-bg);
      border: 1px solid var(--verify-fail-border);
    }

    .tool-notice a {
      opacity: 0.75;
      margin-left: 6px;
      font-size: 0.75rem;
    }

    .tool-notice.fetch a { color: var(--lookup-text); }
    .tool-notice.verify-ok a { color: var(--verify-ok-text); }
    .tool-notice.verify-fail a { color: var(--verify-fail-text); }

    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.25rem 0;
      max-width: 85%;
    }

    .qbtn {
      font-family: 'Crimson Pro', serif;
      font-size: 0.85rem;
      padding: 4px 12px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.15s, color 0.15s;
      font-style: italic;
    }

    .qbtn:hover { background: var(--surface2); color: var(--gold-light); }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 1rem 0 1.5rem;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      font-size: 1rem;
      padding: 0.65rem 0.85rem;
      border-radius: 2px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    #user-input:focus { border-color: var(--border-strong); }
    #user-input::placeholder { color: var(--text-dim); font-style: italic; }

    #send-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 0 1.1rem;
      height: 44px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: var(--surface2); color: var(--gold-light); }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    .error-msg { color: #c46a6a; font-style: italic; font-size: 0.9rem; }

    footer {
      width: 100%;
      text-align: center;
      padding: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    footer a { color: var(--text-dim); }

    @media (max-width: 480px) {
      .msg { max-width: 95%; font-size: 0.95rem; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Pathfinder 2e &mdash; Character Guide</h1>
  <p>A guide to help you build a character that fits your vision</p>
  <div class="ornament">&#10022; &#10022; &#10022;</div>
</header>

<main>
  <div id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>
  <div class="input-area">
    <textarea
      id="user-input"
      placeholder="Describe your character idea, or ask anything..."
      rows="1"
      aria-label="Your message"
    ></textarea>
    <button id="send-btn" aria-label="Send message">Send</button>
  </div>
</main>

<footer>
  Pathfinder 2e is a trademark of Paizo Inc. This tool is unofficial and fan-made.
  Rules sourced from <a href="https://2e.aonprd.com" target="_blank" rel="noopener">Archives of Nethys</a>.
</footer>

<script>
const SYSTEM_PROMPT = `You are a Pathfinder 2e character creation guide. Your knowledge of specific game elements — ancestries, classes, backgrounds, feats, archetypes, spells — comes ONLY from the Archives of Nethys (2e.aonprd.com) via your fetch_nethys and verify_exists tools. You do not rely on your training data for specific PF2e rules because it may contain errors or content from other game systems.

CRITICAL RULES:
- Before discussing any ancestry, class, archetype, background, or feat that a player mentions, use verify_exists to confirm it actually exists in PF2e. Do not skip this step even for things that sound familiar.
- If verify_exists returns NOT FOUND, tell the player clearly: that element does not exist in Pathfinder 2e. Do not try to describe it, work around it, or suggest it might exist under another name unless you have verified that alternative on Nethys.
- Never describe rules from memory alone. If you need specific rules details, fetch them from Nethys.
- Content from other game systems (D&D 5e, Pathfinder 1e, etc.) must never be presented as PF2e content.
- If you are uncertain whether something exists in PF2e, verify it. Uncertainty is not a reason to guess.

CONVERSATION FLOW — follow this order strictly:
Step 1: Deliver the greeting exactly as written below. Wait for the player to answer roleplay-focused, optimized, or somewhere in between. Store this as their stated goal and use it to shape every recommendation you make for the rest of the conversation.
Step 2: After the player answers, ask about their playstyle (melee, ranged, magic, support, stealth, etc.) and character concept (a personality, a fantasy, a backstory hook, or just a vibe). Ask both questions together but wait for their answers before making any suggestions.
Step 3: Only after you have their goal, playstyle, and concept, begin suggesting classes, ancestries, and backgrounds. Always offer 2-3 options, not exhaustive lists.
Step 4: Once class and ancestry are settled, discuss feat selection. Align feat recommendations to their stated goal: if roleplay-focused, prioritise feats with strong narrative flavour or that reinforce their concept even if not optimal; if optimized, prioritise feats that improve action economy, damage, survivability, or key skill checks; if somewhere in between, lead with feats that do both.
Step 5: Once core choices are settled, discuss Free Archetype options using the same goal-alignment approach.
Step 6: When all main choices are made, offer a clean summary of the character.

GOAL-ALIGNED RECOMMENDATIONS:
- Roleplay-focused: prioritise thematic fit, narrative coherence, and choices that reflect the character's personality and backstory. Flag mechanical weaknesses honestly but do not push the player away from flavourful picks unless something is genuinely unplayable.
- Optimized: prioritise attribute synergy, feat chains, action economy, and class feature interactions. Flag flavour tradeoffs but lead with what performs best.
- Somewhere in between: lead with picks that are both flavourful and mechanically sound. When a strong thematic pick is also mechanically weak, say so clearly and offer a comparable alternative that does both.

GENERAL APPROACH:
- Do not just validate every choice. Push back when something does not work well for the player's stated goal.
- Keep responses concise. Players need clear guidance, not walls of text.
- Explain jargon when you use it.
- Never use em dashes. Use colons, commas, or sentence breaks instead.

Tell the player you are looking something up before each tool call, using natural phrasing like "Let me check that on Nethys..." or "Verifying that exists in PF2e...".

When greeting the player for the first time, use exactly this message and no other:

<p>Welcome! I'm here to help you build a Pathfinder 2e character that you'll love playing.</p><p><i>First, a quick question to point us in the right direction:</i></p><p>Are you looking to build a character that's...</p><ul><li><b>Roleplay-focused:</b> choices that reflect your character's personality, backstory, and place in the world, even if some picks aren't the most powerful</li><li><b>Optimized:</b> built to perform as effectively as possible mechanically</li><li><b>Somewhere in between:</b> grounded in concept, but with an eye on making solid choices</li></ul><p>Once I know that, I'll ask you about:</p><ul><li><b>Your playstyle:</b> do you want to be in the thick of melee, casting from the back, supporting allies, sneaking around, or something else entirely?</li><li><b>Your character concept:</b> a grizzled veteran, a curious scholar, a street thief, a disgraced noble... anything that excites you, or just a vibe if you're not sure yet</li></ul><p>I can help you identify which classes, archetypes, and subclasses fit your vision, find ancestries and backgrounds that complement your character thematically and support your key attributes, and choose feats that align with your goals, whether that's storytelling, mechanical performance, or both.</p><p>This campaign uses the <b>Free Archetype</b> rule. At 2nd level and every even level after, you receive a bonus feat that can only be spent on archetype feats. Archetypes cover a wide range of options that add flavor and capabilities beyond class dips. Your GM may restrict which archetypes are available to fit the campaign's theme, or leave it fully open. We'll talk through your options once your core class is settled, but check in with your GM to confirm.</p><p>So, are you going roleplay-focused, optimized, or somewhere in between?</p>`;

let history = [];
let conversationStage = 'goal'; // goal -> playstyle -> concept -> free
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(role, text, isThinking = false) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Guide';
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isThinking ? ' thinking' : '');
  if (role === 'assistant' && !isThinking) {
    div.innerHTML = text;
  } else {
    div.textContent = text;
  }
  wrap.appendChild(label);
  wrap.appendChild(div);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return { wrap, div };
}

function addToolNotice(lookup) {
  const notice = document.createElement('div');

  if (lookup.type === 'fetch') {
    notice.className = 'tool-notice fetch';
    notice.innerHTML = `Checking Nethys: ${lookup.reason} <a href="${lookup.url}" target="_blank" rel="noopener">[source]</a>`;
  } else if (lookup.type === 'verify') {
    const found = lookup.found;
    notice.className = 'tool-notice ' + (found ? 'verify-ok' : 'verify-fail');
    const icon = found ? '&#10003;' : '&#10007;';
    notice.innerHTML = `${icon} Verifying "${lookup.term}" in PF2e <a href="${lookup.url}" target="_blank" rel="noopener">[source]</a>`;
  }

  messagesEl.appendChild(notice);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showQuickReplies(stage, context) {
  const wrap = document.createElement('div');
  wrap.className = 'quick-btns';

  let prompts = [];

  if (stage === 'goal') {
    prompts = [
      'Roleplay-focused',
      'Optimized',
      'Somewhere in between',
    ];
  } else if (stage === 'playstyle') {
    prompts = [
      'I want to be in melee, up front',
      'I want to cast spells from the back',
      'I want to support and heal allies',
      'I want to be stealthy and sneaky',
      'I want a mix of combat and skills',
    ];
  } else if (stage === 'concept') {
    prompts = [
      'A grizzled veteran soldier',
      'A curious scholar or sage',
      'A street thief or criminal',
      'A disgraced or fallen noble',
      'Surprise me',
    ];
  }

  prompts.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'qbtn';
    btn.textContent = p;
    btn.onclick = () => { wrap.remove(); sendMessage(p); };
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function callAPI(messages) {
  const res = await fetch('/.netlify/functions/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: SYSTEM_PROMPT, messages }),
  });
  if (!res.ok) throw new Error('Server error ' + res.status);
  return res.json();
}

async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;

  // Advance stage when player answers the goal question
  if (conversationStage === 'goal') {
    conversationStage = 'playstyle';
  }

  const { wrap: thinkWrap, div: thinkDiv } = addMessage('assistant', 'Thinking', true);

  try {
    const data = await callAPI(history);
    thinkWrap.remove();

    if (data.toolLookups && data.toolLookups.length > 0) {
      data.toolLookups.forEach(lookup => addToolNotice(lookup));
    }

    const reply = data.reply || 'Sorry, something went wrong.';
    addMessage('assistant', reply);
    history.push({ role: 'assistant', content: reply });

    // Show contextual quick replies based on conversation stage
    if (conversationStage === 'goal') {
      // After greeting, player hasn't answered goal question yet — buttons already shown
    } else if (conversationStage === 'playstyle') {
      showQuickReplies('playstyle');
      conversationStage = 'concept';
    } else if (conversationStage === 'concept') {
      showQuickReplies('concept');
      conversationStage = 'free';
    }
  } catch (e) {
    thinkDiv.textContent = 'Something went wrong. Please try again.';
    thinkDiv.classList.remove('thinking');
    thinkDiv.classList.add('error-msg');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

sendBtn.onclick = () => sendMessage(inputEl.value);
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
});

(async () => {
  sendBtn.disabled = true;
  const { wrap: thinkWrap, div: thinkDiv } = addMessage('assistant', 'Loading', true);
  try {
    const data = await callAPI([{ role: 'user', content: 'Hello, I need help creating a Pathfinder 2e character.' }]);
    thinkWrap.remove();
    const greeting = data.reply || 'Hello! Tell me about the character you want to play.';
    addMessage('assistant', greeting);
    history.push({ role: 'user', content: 'Hello, I need help creating a Pathfinder 2e character.' });
    history.push({ role: 'assistant', content: greeting });
    showQuickReplies('goal');
  } catch {
    thinkDiv.textContent = 'Could not connect. Please refresh the page.';
    thinkDiv.classList.remove('thinking');
    thinkDiv.classList.add('error-msg');
  }
  sendBtn.disabled = false;
})();
</script>
</body>
</html>
